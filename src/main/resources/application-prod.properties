spring.application.name=nirdist-backend
server.port=${PORT:8080}

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:${JDBC_DATABASE_URL}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration for PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQL10Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# JWT Configuration - Using a 512-bit (64-byte) Base64-encoded secret
jwt.secret=${JWT_SECRET:51llV0Q+aMC2Rike4xj4evPsOk9RoXd91V2dQq1W4Zr0Eu5IlFM4tXK1oAt9hJYL3t1DTIDiBam7io6Hwgrleg==}
jwt.expiration=86400000

# Logging
logging.level.root=INFO
logging.level.com.nirdist=DEBUG
logging.level.org.springframework.security=DEBUG

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Web Application Configuration
spring.web.resources.static-locations=classpath:/webapp/,classpath:/static/,classpath:/public/
spring.web.resources.cache.period=3600

# Error Handling
server.error.whitelabel.enabled=false
server.error.include-binding-errors=always
server.error.include-message=always
server.error.include-stacktrace=on_param
server.error.include-exception=false

# Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# SQL Initialization
spring.sql.init.mode=never
