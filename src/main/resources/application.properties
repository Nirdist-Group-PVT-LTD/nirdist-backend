spring.application.name=nirdist-backend
server.port=${PORT:8080}

# PostgreSQL Database Configuration
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/nirdist}
spring.datasource.username=${DATABASE_USER:postgres}
spring.datasource.password=${DATABASE_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# SQL Initialization
spring.sql.init.mode=never
spring.sql.init.data-locations=classpath:init-db.sql
spring.sql.init.continue-on-error=false
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration - Using a 512-bit (64-byte) Base64-encoded secret
# This is a properly generated 512-bit (64-byte) secret for HS512 algorithm
jwt.secret=Xwoz0PeTfcT9ZCIMibVdjaSwt1nLI4FSZqNnamq7WhLcNHQL5+toey4H5VlNBLZjbJFjQN+2BmugQzhzRDl18g==
jwt.expiration=86400000

# Logging
logging.level.root=INFO
logging.level.com.nirdist=DEBUG
logging.level.org.springframework.security=DEBUG

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
