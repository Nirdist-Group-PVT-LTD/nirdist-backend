spring.application.name=nirdist-backend
server.port=${PORT:8080}

# Database Configuration - Using H2 in-memory for testing
# For production, switch to PostgreSQL
spring.datasource.url=jdbc:h2:mem:nirdist;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# SQL Initialization
spring.sql.init.mode=never
spring.sql.init.data-locations=classpath:init-db.sql
spring.sql.init.continue-on-error=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration - Using a 512-bit (64-byte) Base64-encoded secret
# This is a properly generated Base64-encoded secret for HS512 algorithm
jwt.secret=51llV0Q+aMC2Rike4xj4evPsOk9RoXd91V2dQq1W4Zr0Eu5IlFM4tXK1oAt9hJYL3t1DTIDiBam7io6Hwgrleg==
jwt.expiration=86400000

# Logging
logging.level.root=INFO
logging.level.com.nirdist=DEBUG
logging.level.org.springframework.security=DEBUG

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Web Application Configuration
# Serve static files from the Flutter web build
spring.web.resources.static-locations=classpath:/webapp/,classpath:/static/,classpath:/public/
spring.web.resources.cache.period=3600

# Error Handling - Disable default error page
server.error.whitelabel.enabled=false
server.error.include-binding-errors=always
server.error.include-message=always
server.error.include-stacktrace=on_param
server.error.include-exception=false
