services:
  - type: web
    name: nirdist-backend
    env: java
    region: oregon
    plan: free
    buildCommand: chmod +x mvnw && ./mvnw clean install -DskipTests
    startCommand: java -Dserver.port=$PORT -jar target/nirdist-backend-1.0.0.jar
    envVars:
      - key: DB_HOST
        value: localhost
      - key: DB_USER
        value: root
      - key: DB_PASSWORD
        fromDatabase:
          name: nirdist-db
          property: password
      - key: DB_NAME
        value: nirdist
      - key: JWT_SECRET
        generateValue: true
      - key: JDBC_DATABASE_URL
        fromDatabase:
          name: nirdist-db
          property: connectionString
    healthCheckPath: /api/health
    
databases:
  - name: nirdist-db
    databaseName: nirdist
    user: root
